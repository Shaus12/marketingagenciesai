name: Sync Meta Ads → Supabase

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Ads

    env:
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      SUPABASE_URL_BACKOFFICE: ${{ secrets.SUPABASE_URL_BACKOFFICE }}
      SUPABASE_SERVICE_KEY_BACKOFFICE: ${{ secrets.SUPABASE_SERVICE_KEY_BACKOFFICE }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      # --- Phase 1: Execute pending actions ---
      - name: Process action queue
        run: python -m scripts.process_actions

      # --- Phase 2: Sync fresh data ---
      - name: Sync Meta data → Supabase
        run: python -m scripts.sync_to_supabase

      # --- Phase 3: Full funnel tracking ---
      - name: Track funnel (registrations → attendance → purchases)
        continue-on-error: true
        run: python -m scripts.funnel_tracker

      # --- Phase 4: Automated rules ---
      - name: Auto rules (kill losers, detect winners, budget drift)
        continue-on-error: true
        run: python -m scripts.auto_rules

      - name: Execute any new queued actions
        continue-on-error: true
        run: python -m scripts.process_actions

      # --- Phase 5: Email nurture ---
      - name: Webinar nurture emails
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python -m scripts.webinar_nurture

      # --- Phase 6: AI Analysis + Notifications ---
      - name: Telegram pulse + AI Analyst (if due)
        run: python -m scripts.telegram_pulse
